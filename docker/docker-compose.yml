version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.inference
    entrypoint: ["uvicorn", "inference.api.server:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      ARTIFACT_DIR: /artifacts
    volumes:
      - artifacts:/artifacts
      - hf_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  workers:
    build:
      context: ..
      dockerfile: docker/Dockerfile.inference
    environment:
      REDIS_HOST: redis
      ARTIFACT_DIR: /artifacts
      NUM_GPUS: 4
    volumes:
      - artifacts:/artifacts
      - hf_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  artifacts:
  hf_cache:
